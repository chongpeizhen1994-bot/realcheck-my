<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RealCheck MY</title>

<style>
body { font-family: Arial; background:#f8fafc; margin:0; }
.container { max-width:900px; margin:auto; padding:20px; }
.card { background:white; padding:15px; margin:10px 0; border-radius:10px; }
button { padding:10px; background:black; color:white; border:none; border-radius:8px; }
input { padding:10px; width:100%; margin:5px 0; }
</style>
</head>

<body>

<div class="container">

<h1>RealCheck MY</h1>
<p>Real reviews for places & services in Malaysia</p>

<h3>Leave a Review</h3>

<input id="name" placeholder="Place name">
<input id="comment" placeholder="Your review">
<button onclick="addReview()">Submit</button>

<h3>Reviews</h3>
<div id="reviews"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAyhdcyUeUB9lNehaUPjSSFBxM04pJx36k",
  authDomain: "realcheck-my.firebaseapp.com",
  projectId: "realcheck-my",
  storageBucket: "realcheck-my.firebasestorage.app",
  messagingSenderId: "29493644662",
  appId: "1:29493644662:web:ef243cd03837d127f27e57"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 加载已有评论
async function loadReviews() {
  const querySnapshot = await getDocs(collection(db, "reviews"));
  document.getElementById("reviews").innerHTML = "";
  querySnapshot.forEach((doc) => {
    const data = doc.data();
    let div = document.createElement("div");
    div.className = "card";
    div.innerHTML = "<b>" + data.name + "</b><br>" + data.comment;
    document.getElementById("reviews").appendChild(div);
  });
}

// 添加评论
window.addReview = async function () {
  let name = document.getElementById("name").value;
  let comment = document.getElementById("comment").value;

  if (!name || !comment) return;

  await addDoc(collection(db, "reviews"), {
    name: name,
    comment: comment
  });

  document.getElementById("name").value = "";
  document.getElementById("comment").value = "";

  loadReviews();
};

// 页面加载时读取数据
loadReviews();
</script>

</body>
</html>

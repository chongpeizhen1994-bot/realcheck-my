<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RealCheck MY</title>

<style>
body { margin:0; font-family:Arial; background:#f6f7f9; }

.nav {
  background:white;
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
}

.logo { font-weight:bold; font-size:20px; }

.search {
  padding:10px;
  width:250px;
  border-radius:20px;
  border:1px solid #ddd;
}

/* 分类 */
.categories {
  display:flex;
  gap:10px;
  padding:20px;
}

.cat {
  background:white;
  padding:10px 15px;
  border-radius:20px;
  cursor:pointer;
}

.cat.active {
  border:2px solid red;
}

/* 内容 */
.container { padding:20px; max-width:900px; margin:auto; }

.card {
  background:white;
  padding:15px;
  margin-bottom:15px;
  border-radius:12px;
}

/* 按钮 */
button {
  padding:10px;
  border:none;
  border-radius:10px;
  background:black;
  color:white;
}

/* 浮动 */
.float {
  position:fixed;
  bottom:20px;
  right:20px;
}

/* 弹窗 */
.modal {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.box {
  background:white;
  padding:20px;
  border-radius:10px;
  width:300px;
  position:relative;
}

.close {
  position:absolute;
  right:10px;
  top:10px;
  cursor:pointer;
}

input, select {
  width:100%;
  padding:10px;
  margin:5px 0;
}
</style>
</head>

<body>

<div class="nav">
  <div class="logo">RealCheck MY</div>
  <input id="search" class="search" placeholder="Search..." oninput="applyFilter()">
</div>

<div class="categories">
  <div class="cat active" onclick="setCategory('All', this)">All</div>
  <div class="cat" onclick="setCategory('Food', this)">🍜 Food</div>
  <div class="cat" onclick="setCategory('Beauty', this)">💅 Beauty</div>
  <div class="cat" onclick="setCategory('Wellness', this)">💆 Wellness</div>
  <div class="cat" onclick="setCategory('Hair', this)">💇 Hair</div>
</div>

<div class="container">
  <div id="list"></div>
</div>

<div class="float">
  <button onclick="openForm()">+ Review</button>
</div>

<div class="modal" id="modal">
  <div class="box">
    <div class="close" onclick="closeForm()">✖</div>

    <h3>Add Review</h3>
    <input id="name" placeholder="Place name">
    <input id="comment" placeholder="Review">

    <select id="category">
      <option>Food</option>
      <option>Beauty</option>
      <option>Wellness</option>
      <option>Hair</option>
    </select>

    <select id="rating">
      <option value="5">⭐⭐⭐⭐⭐</option>
      <option value="4">⭐⭐⭐⭐</option>
      <option value="3">⭐⭐⭐</option>
      <option value="2">⭐⭐</option>
      <option value="1">⭐</option>
    </select>

    <button onclick="addReview()">Submit</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAyhdcyUeUB9lNehaUPjSSFBxM04pJx36k",
  authDomain: "realcheck-my.firebaseapp.com",
  projectId: "realcheck-my",
  storageBucket: "realcheck-my.firebasestorage.app",
  messagingSenderId: "29493644662",
  appId: "1:29493644662:web:ef243cd03837d127f27e57"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allData = [];
let currentCategory = "All";

/* 打开关闭 */
window.openForm = ()=> modal.style.display="flex";
window.closeForm = ()=> modal.style.display="none";

/* 点击外面关闭 */
window.onclick = e=>{
  if(e.target.id==="modal") closeForm();
}

/* ESC关闭 */
window.onkeydown = e=>{
  if(e.key==="Escape") closeForm();
}

/* 添加评论 */
window.addReview = async ()=>{
  let name = nameInput.value;
  let comment = commentInput.value;
  let category = categoryInput.value;
  let rating = ratingInput.value;

  if(!name || !comment) return;

  await addDoc(collection(db,"reviews"),{
    name, comment,
    category,
    rating:Number(rating)
  });

  nameInput.value="";
  commentInput.value="";
  closeForm();
  loadReviews();
}

/* 分类点击 */
window.setCategory = function(cat, el){
  currentCategory = cat;

  document.querySelectorAll(".cat").forEach(c=>c.classList.remove("active"));
  el.classList.add("active");

  applyFilter();
}

/* 搜索+分类一起 */
window.applyFilter = function(){
  let q = search.value.toLowerCase();

  let filtered = allData.filter(d=>{
    let matchText = d.name.toLowerCase().includes(q);
    let matchCat = currentCategory==="All" || !d.category || d.category===currentCategory;
    return matchText && matchCat;
  });

  render(filtered);
}

/* 渲染 */
function render(data){
  list.innerHTML="";

  let grouped = {};
  data.forEach(d=>{
    if(!grouped[d.name]) grouped[d.name]=[];
    grouped[d.name].push(d);
  });

  for(let name in grouped){
    let items = grouped[name];
    let avg = (items.reduce((a,b)=>a+b.rating,0)/items.length).toFixed(1);

    let div = document.createElement("div");
    div.className="card";
    div.innerHTML = `
      <b>${name}</b><br>
      ⭐ ${avg} (${items.length})
      <br><br>
      ${items.map(i=>`- ${i.comment}`).join("<br>")}
    `;
    list.appendChild(div);
  }
}

/* 加载 */
async function loadReviews(){
  let snap = await getDocs(collection(db,"reviews"));
  allData = snap.docs.map(d=>d.data());
  applyFilter();
}

loadReviews();
</script>

</body>
</html>

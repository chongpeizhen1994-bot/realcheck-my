<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RealCheck MY</title>

<style>
body { margin:0; font-family:Arial; background:#f5f6f8; }

/* NAV */
.nav {
  background:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

.search {
  padding:8px;
  border-radius:20px;
  border:1px solid #ddd;
}

/* CATEGORY */
.categories {
  display:flex;
  gap:10px;
  padding:15px;
}

.cat {
  background:white;
  padding:8px 12px;
  border-radius:20px;
  cursor:pointer;
}

.active { border:2px solid red; }

/* LIST */
.container { padding:20px; }

.card {
  background:white;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
  cursor:pointer;
}

/* MODAL */
.modal {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.box {
  background:white;
  padding:20px;
  border-radius:10px;
  width:300px;
}

button {
  padding:10px;
  border:none;
  background:black;
  color:white;
  border-radius:8px;
  margin-top:5px;
}

input, select {
  width:100%;
  padding:8px;
  margin:5px 0;
}
</style>
</head>

<body>

<div class="nav">
  <b>RealCheck MY</b>
  <input id="search" class="search" placeholder="Search..." oninput="applyFilter()">
</div>

<div class="categories">
  <div class="cat active" onclick="setCat('All',this)">All</div>
  <div class="cat" onclick="setCat('Food',this)">Food</div>
  <div class="cat" onclick="setCat('Beauty',this)">Beauty</div>
</div>

<div class="container" id="list"></div>

<!-- DETAIL PAGE -->
<div class="container" id="detail" style="display:none"></div>

<button style="position:fixed;bottom:20px;right:20px" onclick="openForm()">+ Review</button>

<!-- FORM -->
<div class="modal" id="modal">
  <div class="box">
    <h3>Add Review</h3>
    <input id="name" placeholder="Place name">
    <input id="comment" placeholder="Review">

    <select id="category">
      <option>Food</option>
      <option>Beauty</option>
    </select>

    <select id="rating">
      <option value="5">⭐⭐⭐⭐⭐</option>
      <option value="4">⭐⭐⭐⭐</option>
      <option value="3">⭐⭐⭐</option>
      <option value="2">⭐⭐</option>
      <option value="1">⭐</option>
    </select>

    <button onclick="addReview()">Submit</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAyhdcyUeUB9lNehaUPjSSFBxM04pJx36k",
  authDomain: "realcheck-my.firebaseapp.com",
  projectId: "realcheck-my"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allData = [];
let currentCat = "All";

/* OPEN CLOSE */
window.openForm = ()=> modal.style.display="flex";
window.onclick = e=>{ if(e.target.id==="modal") modal.style.display="none"; }

/* ADD */
window.addReview = async ()=>{
  let name=nameInput.value;
  let comment=commentInput.value;
  let rating=ratingInput.value;
  let category=categoryInput.value;

  if(!name||!comment) return;

  await addDoc(collection(db,"reviews"),{
    name,comment,rating:Number(rating),category
  });

  modal.style.display="none";
  load();
}

/* FILTER */
window.setCat = (c,el)=>{
  currentCat=c;
  document.querySelectorAll(".cat").forEach(i=>i.classList.remove("active"));
  el.classList.add("active");
  applyFilter();
}

window.applyFilter = ()=>{
  let q=search.value.toLowerCase();

  let filtered = allData.filter(d=>{
    return (currentCat==="All"||d.category===currentCat)
    && d.name.toLowerCase().includes(q);
  });

  renderList(filtered);
}

/* LIST */
function renderList(data){
  list.innerHTML="";
  detail.style.display="none";
  list.style.display="block";

  let grouped={};

  data.forEach(d=>{
    if(!grouped[d.name]) grouped[d.name]=[];
    grouped[d.name].push(d);
  });

  for(let name in grouped){
    let items=grouped[name];
    let avg=(items.reduce((a,b)=>a+b.rating,0)/items.length).toFixed(1);

    let div=document.createElement("div");
    div.className="card";
    div.innerHTML=`<b>${name}</b><br>⭐ ${avg} (${items.length})`;

    div.onclick=()=>openDetail(name,items);

    list.appendChild(div);
  }
}

/* DETAIL */
window.openDetail = (name,items)=>{
  list.style.display="none";
  detail.style.display="block";

  detail.innerHTML = `
    <button onclick="back()">← Back</button>
    <h2>${name}</h2>
    <p>⭐ ${(items.reduce((a,b)=>a+b.rating,0)/items.length).toFixed(1)}</p>
    ${items.map(i=>`
      <div class="card">
        ${i.comment}<br>
        👍 <span onclick="like(this)">0</span>
      </div>
    `).join("")}
  `;
}

window.back = ()=>{
  detail.style.display="none";
  list.style.display="block";
}

/* LIKE */
window.like = (el)=>{
  el.innerText = Number(el.innerText)+1;
}

/* LOAD */
async function load(){
  let snap=await getDocs(collection(db,"reviews"));
  allData=snap.docs.map(d=>d.data());
  applyFilter();
}

load();
</script>

</body>
</html>
